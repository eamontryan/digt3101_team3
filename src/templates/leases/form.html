{% extends "layout/base.html" %}
{% block title %}Create Lease - REMS{% endblock %}

{% block content %}
<h2 class="mb-4">Create New Lease</h2>

<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Tenant</label>
                    <select name="tenant_id" class="form-select" required>
                        <option value="">-- Select Tenant --</option>
                        {% for tenant in tenants %}
                        <option value="{{ tenant.user_id }}">{{ tenant.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Unit</label>
                    <select name="unit_id" class="form-select" required>
                        <option value="">-- Select Unit --</option>
                        {% for unit in units %}
                        <option value="{{ unit.unit_id }}">{{ unit.mall.name }} - {{ unit.location }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Start Date</label>
                    <input type="date" name="start_date" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">End Date</label>
                    <input type="date" name="end_date" class="form-control" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Payment Cycle</label>
                    <select name="payment_cycle" class="form-select" required>
                        <option value="Monthly">Monthly</option>
                        <option value="Quarterly">Quarterly</option>
                        <option value="Semi-Annual">Semi-Annual</option>
                        <option value="Annual">Annual</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Rate Increase on Renewal (%)</label>
                    <input type="number" step="0.01" name="renewal_rate_increase" class="form-control">
                </div>
                <div class="col-md-3">
                    <div class="form-check mt-4">
                        <input class="form-check-input" type="checkbox" name="auto_renew" id="auto_renew" value="1">
                        <label class="form-check-label" for="auto_renew">Enable Auto-Renewal</label>
                    </div>
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">Create Lease</button>
                <a href="{{ url_for('leases.list_leases') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
