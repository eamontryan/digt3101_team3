{% extends "layout/base.html" %}
{% block title %}Submit Application - REMS{% endblock %}

{% block content %}
<h2 class="mb-4">Submit Rental Application</h2>

<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST" enctype="multipart/form-data">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="mb-3">
                <label class="form-label">Select Unit</label>
                <select name="unit_id" class="form-select" required>
                    <option value="">-- Select an available unit --</option>
                    {% for unit in units %}
                    <option value="{{ unit.unit_id }}">{{ unit.mall.name }} - {{ unit.location }} ({{ "%.2f"|format(unit.rental_rate) }}/month)</option>
                    {% endfor %}
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Supporting Documents</label>
                <input type="file" name="documents" class="form-control" multiple accept=".pdf,.jpg,.jpeg,.png,.doc,.docx">
                <div class="form-text">Upload business permits, valid IDs, financial statements, etc. (PDF, JPG, PNG, DOC)</div>
            </div>
            <button type="submit" class="btn btn-primary">Submit Application</button>
            <a href="{{ url_for('applications.list_applications') }}" class="btn btn-outline-secondary">Cancel</a>
        </form>
    </div>
</div>
{% endblock %}
