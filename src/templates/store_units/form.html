{% extends "layout/base.html" %}
{% block title %}{% if unit %}Edit Unit{% else %}Add Unit{% endif %} - REMS{% endblock %}

{% block content %}
<h2 class="mb-4">{% if unit %}Edit Store Unit{% else %}Add Store Unit{% endif %}</h2>

<div class="card shadow-sm">
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Mall</label>
                    <select name="mall_id" class="form-select" required>
                        {% for mall in malls %}
                        <option value="{{ mall.mall_id }}" {% if unit and unit.mall_id == mall.mall_id %}selected{% endif %}>
                            {{ mall.name }}
                        </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Location</label>
                    <input type="text" name="location" class="form-control" value="{{ unit.location if unit else '' }}" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Size (sqm)</label>
                    <input type="number" step="0.01" name="size" class="form-control" value="{{ unit.size if unit else '' }}" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Monthly Rate</label>
                    <input type="number" step="0.01" name="rental_rate" class="form-control" value="{{ unit.rental_rate if unit else '' }}" required>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Classification Tier</label>
                    <select name="classification_tier" class="form-select">
                        <option value="">-- Select --</option>
                        {% for tier in ['Economy', 'Standard', 'Premium', 'Anchor'] %}
                        <option value="{{ tier }}" {% if unit and unit.classification_tier == tier %}selected{% endif %}>{{ tier }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">Availability</label>
                    <select name="availability" class="form-select" required>
                        {% for status in ['Available', 'Occupied', 'Under Maintenance'] %}
                        <option value="{{ status }}" {% if unit and unit.availability == status %}selected{% endif %}>{{ status }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Business Purpose</label>
                    <input type="text" name="business_purpose" class="form-control" value="{{ unit.business_purpose if unit else '' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">Contact Info</label>
                    <input type="text" name="contact_info" class="form-control" value="{{ unit.contact_info if unit else '' }}">
                </div>
            </div>
            <div class="mt-4">
                <button type="submit" class="btn btn-primary">{% if unit %}Update{% else %}Create{% endif %} Unit</button>
                <a href="{{ url_for('store_units.list_units') }}" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
